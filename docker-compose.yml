version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: madsjeez-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: madsjeez
      POSTGRES_PASSWORD: madsjeez_secret
      POSTGRES_DB: madsjeez_browser
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U madsjeez -d madsjeez_browser']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: madsjeez-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend-api
      dockerfile: Dockerfile
    container_name: madsjeez-api
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://madsjeez:madsjeez_secret@postgres:5432/madsjeez_browser?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-in-production}
      PORT: 3001
      NODE_ENV: production
      CORS_ORIGIN: http://localhost:3000
      AI_API_KEY: ${AI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
