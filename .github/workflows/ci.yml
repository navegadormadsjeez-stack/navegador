name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-api

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: madsjeez
          POSTGRES_PASSWORD: madsjeez_secret
          POSTGRES_DB: madsjeez_browser
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://madsjeez:madsjeez_secret@localhost:5432/madsjeez_browser

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://madsjeez:madsjeez_secret@localhost:5432/madsjeez_browser
          JWT_SECRET: ci-test-secret
          JWT_REFRESH_SECRET: ci-test-refresh-secret

      - name: Lint
        run: npm run lint

  admin-panel:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-panel

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin-panel/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1

      - name: Lint
        run: npm run lint

  desktop-browser:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop-browser

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore
