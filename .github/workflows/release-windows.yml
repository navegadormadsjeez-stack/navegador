name: Release Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-sign-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: ./desktop-browser/build-installer.ps1

      - name: Upload unsigned installer
        uses: actions/upload-artifact@v4
        id: upload-unsigned
        with:
          name: windows-installer-unsigned
          path: desktop-browser/release/MadsjeezSellerBrowserSetup.exe

      - name: Sign with SignPath Foundation
        id: signpath
        continue-on-error: true
        uses: SignPath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
          project-slug: madsjeez-seller-browser
          signing-policy-slug: release-signing
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: desktop-browser/release/signed

      - name: Use signed installer when available
        shell: pwsh
        run: |
          $signed = "desktop-browser/release/signed/MadsjeezSellerBrowserSetup.exe"
          if (Test-Path $signed) {
            Copy-Item $signed "desktop-browser/release/MadsjeezSellerBrowserSetup.exe" -Force
            Write-Host "Using SignPath signed installer"
          } else {
            Write-Host "SignPath not configured or signing skipped — using unsigned installer"
            Write-Host "Configure secrets per docs/SIGNPATH.md for free code signing"
          }

      - name: Compute checksum
        id: meta
        shell: pwsh
        run: |
          $file = "desktop-browser/release/MadsjeezSellerBrowserSetup.exe"
          $hash = (Get-FileHash $file -Algorithm SHA256).Hash.ToLower()
          $size = (Get-Item $file).Length
          "sha256=$hash" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "size=$size" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "SHA256: $hash"
          Write-Host "Size: $size bytes"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop-browser/release/MadsjeezSellerBrowserSetup.exe
          generate_release_notes: true
          body: |
            ## Instalador Madsjeez Seller Browser

            - **Archivo:** MadsjeezSellerBrowserSetup.exe
            - **SHA256:** `${{ steps.meta.outputs.sha256 }}`
            - **Tamaño:** ${{ steps.meta.outputs.size }} bytes
            - **Requisitos:** Windows 10/11 x64, .NET 8 Desktop Runtime

            Instalador con asistente gráfico (Inno Setup). Firmado con SignPath Foundation cuando los secrets están configurados.

      - name: Upload final installer artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: MadsjeezSellerBrowserSetup
          path: desktop-browser/release/MadsjeezSellerBrowserSetup.exe
